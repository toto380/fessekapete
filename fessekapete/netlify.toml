[build]
  publish = "."

# ------------------------------------------------------------------------------
# 1. EDGE FUNCTIONS (Proxy Stealth)
# L'ordre est CRUCIAL : du plus spécifique au plus général.
# ------------------------------------------------------------------------------

# Gère le chargement de GTM (ex: gtm.js)
[[edge_functions]]
  function = "wv-tm"
  path = "/assets/lib/web-vitals/gtm.js"

# Gère le chargeur GA4 (ex: gtag.js)
[[edge_functions]]
  function = "wv-loader"
  path = "/assets/lib/web-vitals/gtag.js"

# Gère l'envoi des données (collect)
[[edge_functions]]
  function = "wv-collect"
  path = "/assets/lib/web-vitals/g/collect"

# LE "CATCH-ALL" : Intercepte tout le reste (core/t.js, modules, etc.)
# Empêche la 404 et le mauvais type MIME.
[[edge_functions]]
  function = "wv-proxy"
  path = "/assets/lib/web-vitals/*"

# ------------------------------------------------------------------------------
# 2. HEADERS GLOBAUX & SÉCURITÉ (CSP)
# ------------------------------------------------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # CSP mise à jour pour autoriser le tracking proxifié et le Service Worker
    Content-Security-Policy = """
      default-src 'self';
      worker-src 'self' blob:;
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      object-src 'none';
      img-src 'self' data: https: https://upload.wikimedia.org;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org;
      script-src-elem 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org;
      connect-src 'self' https://*.netlify.app https://api.netlify.com https://metrics.stratads.fr;
      frame-src 'self' https://tagmanager.google.com;
      upgrade-insecure-requests;
    """

# ------------------------------------------------------------------------------
# 3. CACHE & MIME TYPES SPÉCIFIQUES
# ------------------------------------------------------------------------------

# Cache pour les scripts JS proxifiés
[[headers]]
  for = "/assets/lib/web-vitals/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

# Pas de cache pour la collecte de données
[[headers]]
  for = "/assets/lib/web-vitals/g/collect"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# Configuration spécifique pour le Service Worker
[[headers]]
  for = "/sw-stealth.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"
    Content-Type = "application/javascript; charset=utf-8"

# ------------------------------------------------------------------------------
# 4. REDIRECTS
# ------------------------------------------------------------------------------

[[redirects]]
  from = "/growth"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/conditions"
  to = "/conditionsp.html"
  status = 200
