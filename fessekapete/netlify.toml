[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

  Content-Security-Policy = """
    default-src 'self';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';

    # 1. IMAGES : On autorise 'self' et les logos externes (Amazon via Wikimedia)
    img-src 'self' data: https: https://upload.wikimedia.org;

    # 2. STYLES : Nécessaire pour Three.js et tes animations
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    
    font-src 'self' https://fonts.gstatic.com data:;

    # 3. SCRIPTS : On débloque Three.js et tes fonctions de popup
    # 'unsafe-inline' permet d'exécuter le code écrit dans tes HTML
    # 'unsafe-eval' est parfois requis par Three.js
    script-src
      'self'
      'unsafe-inline'
      'unsafe-eval'
      https://cdnjs.cloudflare.com
      https://cdn.tailwindcss.com
      https://unpkg.com
      https://threejs.org;

    # 4. ÉLÉMENTS DE SCRIPT : Double sécurité pour le chargement des libs
    script-src-elem
      'self'
      'unsafe-inline'
      https://cdnjs.cloudflare.com
      https://cdn.tailwindcss.com;

    # 5. CONNEXIONS : On autorise seulement 'self' (ton domaine)
    # C'est ici que le camouflage du tracking fonctionne !
    connect-src
      'self'
      https://*.netlify.app
      https://api.netlify.com;

    frame-src
      'self'
      https://tagmanager.google.com;

    upgrade-insecure-requests;
  """
