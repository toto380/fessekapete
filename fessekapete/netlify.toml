[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

  Content-Security-Policy = """
    default-src 'self';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';

    # Autorise les images et les logos partenaires (Amazon, etc.)
    img-src 'self' data: https:;

    # Autorise les polices et styles (essentiel pour le visuel)
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com data:;

    # DÉBLOQUE LES SCRIPTS (Three.js, Tailwind, etc.)
    script-src
      'self'
      'unsafe-inline'
      'unsafe-eval'
      https://cdnjs.cloudflare.com
      https://cdn.tailwindcss.com
      https://unpkg.com
      https://threejs.org;

    # Indispensable pour que le navigateur accepte de charger les fichiers .js externes
    script-src-elem
      'self'
      'unsafe-inline'
      https://cdnjs.cloudflare.com
      https://cdn.tailwindcss.com
      https://unpkg.com;

    # TRACKING FURTIF : On autorise seulement 'self'
    # Les données passent par ton domaine, donc elles sont autorisées ici.
    connect-src
      'self'
      https://*.netlify.app
      https://api.netlify.com;

    frame-src
      'self'
      https://tagmanager.google.com;

    upgrade-insecure-requests;
  """
