[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

  # On définit chaque directive explicitement pour éviter que le navigateur ne retombe sur 'default-src'
  Content-Security-Policy = """
    default-src 'self';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';

    # Correction erreur Amazon logo : on autorise https: partout pour les images
    img-src 'self' data: https:;

    # Correction erreur Fonts & Inline Style (cookie-banner / popup)
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com;
    
    font-src 'self' https://fonts.gstatic.com data:;

    # Correction erreur THREE is not defined (cdnjs) & Inline Scripts
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org;
    script-src-elem 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com;

    # On garde connect-src sur 'self' pour ton tunnel de tracking furtif
    connect-src 'self' https://*.netlify.app https://api.netlify.com;

    frame-src 'self' https://tagmanager.google.com;

    upgrade-insecure-requests;
  """
