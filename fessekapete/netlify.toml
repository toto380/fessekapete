[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

  Content-Security-Policy = """
    default-src 'self';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';

    # Autorise tes images et les logos partenaires
    img-src 'self' data: https: https://upload.wikimedia.org;

    # Autorise les styles pour les animations
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    
    font-src 'self' https://fonts.gstatic.com data:;

    # Débloque Three.js, Tailwind et tes scripts internes
    script-src
      'self'
      'unsafe-inline'
      'unsafe-eval'
      https://cdnjs.cloudflare.com
      https://cdn.tailwindcss.com
      https://unpkg.com
      https://threejs.org;

    # Nécessaire pour l'exécution des modules JS
    script-src-elem
      'self'
      'unsafe-inline'
      https://cdnjs.cloudflare.com
      https://cdn.tailwindcss.com;

    # Garde le tracking furtif (Autorise seulement 'self')
    connect-src
      'self'
      https://*.netlify.app
      https://api.netlify.com;

    frame-src
      'self'
      https://tagmanager.google.com;

    upgrade-insecure-requests;
  """
