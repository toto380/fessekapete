[build]
  publish = "."

[[edge_functions]]
  function = "wv-tm"
  path = "/assets/lib/web-vitals/core/t.js"

[[edge_functions]]
  function = "wv-loader"
  path = "/assets/lib/web-vitals/core/b.js"

[[edge_functions]]
  function = "wv-collect"
  path = "/assets/lib/web-vitals/core/c"

[[edge_functions]]
  function = "wv-collect"
  path = "/assets/lib/web-vitals/core/c/*"

[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"
  Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: https: https://upload.wikimedia.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org; script-src-elem 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org; connect-src 'self' https://*.netlify.app https://api.netlify.com https://metrics.stratads.fr; frame-src 'self' https://tagmanager.google.com; upgrade-insecure-requests;"

[[redirects]]
  from = "/growth"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/conditions"
  to = "/conditionsp.html"
  status = 200
