[build]
  publish = "."

# --- SECTION 1 : CONFIGURATION DES EDGE FUNCTIONS (GHOST STEALTH) ---

[[edge_functions]]
  function = "wv-tm"
  path = "/assets/lib/web-vitals/core/t.js"

[[edge_functions]]
  function = "wv-loader"
  path = "/assets/lib/web-vitals/core/b.js"

[[edge_functions]]
  function = "wv-collect"
  path = "/assets/lib/web-vitals/core/c"

[[edge_functions]]
  function = "wv-collect"
  path = "/assets/lib/web-vitals/core/c/*"

# --- SECTION 2 : HEADERS DE SÉCURITÉ & CSP ---

[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

  Content-Security-Policy = """
    default-src 'self';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';

    # Autorise les images locales et les logos partenaires
    img-src 'self' data: https: https://upload.wikimedia.org;

    # Autorise les styles (Three.js + Fonts)
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com;
    
    font-src 'self' https://fonts.gstatic.com data:;

    # Autorise les scripts nécessaires (Three.js, Tailwind, etc.)
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org;
    script-src-elem 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com;

    # CAMOUFLAGE : 'self' suffit car tout passe désormais par tes Edge Functions
    connect-src 'self' https://*.netlify.app https://api.netlify.com;

    frame-src 'self' https://tagmanager.google.com;

    upgrade-insecure-requests;
  """

# --- SECTION 3 : REDIRECTS STATIQUES ---
# Note : Les anciens redirects vers metrics.stratads.fr ont été supprimés 
# au profit des Edge Functions pour un camouflage maximal.

[[redirects]]
  from = "/growth"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/conditions"
  to = "/conditionsp.html"
  status = 200
