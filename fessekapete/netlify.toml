[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

  Content-Security-Policy = """
    default-src 'self';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';

    # On autorise uniquement soi-même pour les images (le proxy gère le reste)
    img-src 'self' data: https:;

    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com data:;

    # SCRIPT : On retire toute mention de google-analytics ou googletagmanager
    # On garde juste les libs nécessaires à ton design
    script-src
      'self'
      'unsafe-inline'
      'unsafe-eval'
      https://cdn.tailwindcss.com
      https://cdnjs.cloudflare.com
      https://unpkg.com
      https://threejs.org;

    # CONNECT : C'est ici que la magie opère. 
    # On n'autorise QUE 'self' (ton domaine). 
    # Comme la donnée part vers /assets/api/v1/sync, c'est considéré comme 'self'.
    connect-src
      'self'
      https://*.netlify.app
      https://api.netlify.com;

    # FRAME : Uniquement pour ton mode preview si besoin, sinon reste en 'self'
    frame-src
      'self'
      https://tagmanager.google.com;

    upgrade-insecure-requests;
  """
