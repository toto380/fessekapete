[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

  Content-Security-Policy = """
    default-src 'self';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';

    # img-src : On autorise 'self', les data: (pour les icones) et les logos externes (Wikimedia)
    img-src 'self' data: https: https://upload.wikimedia.org;

    # style-src : On autorise les styles inline pour tes animations
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    
    font-src 'self' https://fonts.gstatic.com data:;

    # script-src : C'est ici qu'on débloque Three.js et tes scripts inline
    # 'unsafe-inline' est nécessaire pour tes scripts de tracking et d'init
    script-src
      'self'
      'unsafe-inline'
      'unsafe-eval'
      https://cdnjs.cloudflare.com
      https://cdn.tailwindcss.com
      https://unpkg.com
      https://threejs.org;

    # script-src-elem : Obligatoire pour certains navigateurs
    script-src-elem
      'self'
      'unsafe-inline'
      https://cdnjs.cloudflare.com
      https://cdn.tailwindcss.com;

    # connect-src : On garde 'self' pour le tracking furtif (via /assets/api/v1/sync)
    connect-src
      'self'
      https://*.netlify.app
      https://api.netlify.com;

    frame-src
      'self'
      https://tagmanager.google.com;

    upgrade-insecure-requests;
  """
