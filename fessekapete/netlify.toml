[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
    # On garde une seule déclaration : SAMEORIGIN permet le fonctionnement des outils de debug Google
    X-Frame-Options = "SAMEORIGIN"

    Content-Security-Policy = """
      default-src 'self';
      base-uri 'self';
      form-action 'self';
      object-src 'none';
      upgrade-insecure-requests;
      
      # Autorise l'encadrement pour le tracking et le GTM Debug Mode
      frame-ancestors 'self' https://www.stratads.fr https://tagmanager.google.com;
      
      # Images : Sources internes, data URI, et serveurs de tracking
      img-src 'self' https: data: https://www.google-analytics.com https://www.googletagmanager.com https://metrics.stratads.fr;
      
      # Styles : Tailwind, Google Fonts et inline pour les animations
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      
      # Fonts
      font-src 'self' https://fonts.gstatic.com data:;
      
      # Scripts : Centralise GTM, ton proxy metrics et ton endpoint GCP direct (Cloud Run)
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://unpkg.com https://threejs.org https://fonts.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com https://tagmanager.google.com https://metrics.stratads.fr https://server-side-tagging-6qnp7pn64q-uc.a.run.app;
      script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://unpkg.com https://threejs.org https://fonts.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com https://tagmanager.google.com https://metrics.stratads.fr https://server-side-tagging-6qnp7pn64q-uc.a.run.app;
      
      # Connect : Pour l'envoi des hits de données vers le proxy et l'API Netlify
      connect-src 'self' https://*.netlify.app https://api.netlify.com https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://region1.google-analytics.com https://region1.analytics.google.com https://www.googletagmanager.com https://metrics.stratads.fr https://server-side-tagging-6qnp7pn64q-uc.a.run.app;
      
      # Frames : Nécessaire pour le GTM Preview mode et les Service Workers
      frame-src 'self' https://www.googletagmanager.com https://tagmanager.google.com https://metrics.stratads.fr https://server-side-tagging-6qnp7pn64q-uc.a.run.app;
    """
