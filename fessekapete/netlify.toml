# ============================================
# HEADERS & SÉCURITÉ — stratads.fr
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Anti clickjacking
    X-Frame-Options = "DENY"
    
    # Anti MIME sniffing
    X-Content-Type-Options = "nosniff"
    
    # Referrer Policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Permissions Policy
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

    # Content Security Policy (Optimisée pour sGTM Direct)
    Content-Security-Policy = """
      default-src 'self';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      object-src 'none';

      img-src 'self' https: data: 
        https://metrics.stratads.fr;

      style-src 'self' 'unsafe-inline' 
        https://fonts.googleapis.com;
        
      font-src 'self' 
        https://fonts.gstatic.com data:;

      script-src 
        'self' 
        'unsafe-inline' 
        'unsafe-eval' 
        https://metrics.stratads.fr
        https://cdn.tailwindcss.com 
        https://cdnjs.cloudflare.com 
        https://unpkg.com 
        https://threejs.org;

      script-src-elem 
        'self' 
        'unsafe-inline' 
        'unsafe-eval' 
        https://metrics.stratads.fr
        https://cdn.tailwindcss.com 
        https://cdnjs.cloudflare.com 
        https://unpkg.com 
        https://threejs.org;

      connect-src 
        'self' 
        https://*.netlify.app 
        https://api.netlify.com 
        https://metrics.stratads.fr;

      frame-src 
        'self' 
        https://metrics.stratads.fr;

      upgrade-insecure-requests;
    """

# ============================================
# REDIRECTS SEO & DOMAINE
# ============================================

[[redirects]]
  from = "http://stratads.fr/*"
  to = "https://www.stratads.fr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://stratads.fr/*"
  to = "https://www.stratads.fr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/growth"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/conditions"
  to = "/conditionsp.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
