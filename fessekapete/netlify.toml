[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    X-Frame-Options = "SAMEORIGIN"

    # CSP Assouplie pour Three.js, Inline Scripts et Google Tag Manager
    Content-Security-Policy = """
      default-src 'self' https:;
      base-uri 'self';
      form-action 'self';
      object-src 'none';
      
      # Autorise les styles inline (nécessaire pour Three.js et Tailwind inline)
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      
      # Autorise les scripts externes (cdnjs pour Three.js) et les scripts inline
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org https://www.googletagmanager.com https://www.google-analytics.com https://tagmanager.google.com https://metrics.stratads.fr https://server-side-tagging-6qnp7pn64q-uc.a.run.app;
      script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org https://www.googletagmanager.com https://www.google-analytics.com https://tagmanager.google.com https://metrics.stratads.fr https://server-side-tagging-6qnp7pn64q-uc.a.run.app;
      
      # Connexions de données
      connect-src 'self' https: https://*.netlify.app https://api.netlify.com https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://metrics.stratads.fr https://server-side-tagging-6qnp7pn64q-uc.a.run.app;
      
      # Images et polices
      img-src 'self' https: data:;
      font-src 'self' https://fonts.gstatic.com data:;
      
      # Frames et mode Preview GTM
      frame-src 'self' https://www.googletagmanager.com https://tagmanager.google.com https://metrics.stratads.fr;
      frame-ancestors 'self' https://www.stratads.fr https://tagmanager.google.com;
      
      upgrade-insecure-requests;
    """
