[build]
  publish = "."

# ------------------------------------------------------------------------------
# 1. EDGE FUNCTIONS (Proxy Stealth)
# ------------------------------------------------------------------------------

[[edge_functions]]
  function = "wv-tm"
  path = "/assets/lib/web-vitals/container.js"

[[edge_functions]]
  function = "wv-loader"
  path = "/assets/lib/web-vitals/loader.js"

[[edge_functions]]
  function = "wv-collect"
  path = "/assets/lib/web-vitals/telemetry"

[[edge_functions]]
  function = "wv-proxy"
  path = "/assets/lib/web-vitals/*"

# ------------------------------------------------------------------------------
# 2. HEADERS GLOBAUX & SÉCURITÉ (CSP mise à jour)
# ------------------------------------------------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # On ajoute Google Manager et Analytics dans script-src et connect-src
    Content-Security-Policy = """
      default-src 'self';
      worker-src 'self' blob:;
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      object-src 'none';
      img-src 'self' data: https: https://upload.wikimedia.org;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org https://www.googletagmanager.com;
      script-src-elem 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org https://www.googletagmanager.com;
      connect-src 'self' https://*.netlify.app https://api.netlify.com https://metrics.stratads.fr https://www.googletagmanager.com https://www.google-analytics.com;
      frame-src 'self' https://tagmanager.google.com;
      upgrade-insecure-requests;
    """

# ------------------------------------------------------------------------------
# 3. CACHE & MIME TYPES
# ------------------------------------------------------------------------------

[[headers]]
  for = "/assets/lib/web-vitals/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/lib/web-vitals/telemetry"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/sw-stealth.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"
    Content-Type = "application/javascript; charset=utf-8"

# ------------------------------------------------------------------------------
# 4. REDIRECTS
# ------------------------------------------------------------------------------

[[redirects]]
  from = "/growth"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/conditions"
  to = "/conditionsp.html"
  status = 200
