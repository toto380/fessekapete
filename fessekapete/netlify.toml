[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

  Content-Security-Policy = """
    default-src 'self';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    object-src 'none';

    # Correction erreur Amazon logo : Autorise les images externes
    img-src 'self' data: https: https://upload.wikimedia.org;

    # Correction erreur 'Applying inline style' :
    # On ajoute 'unsafe-hashes' pour autoriser les styles dans les attributs style="..."
    style-src 'self' 'unsafe-inline' 'unsafe-hashes' https://fonts.googleapis.com;
    style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com;
    
    font-src 'self' https://fonts.gstatic.com data:;

    # Débloque Three.js et tes scripts
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://threejs.org;
    script-src-elem 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com;

    # Tracking furtif : Seul 'self' est autorisé (le tunnel /assets/api/v1/sync)
    connect-src 'self' https://*.netlify.app https://api.netlify.com;

    frame-src 'self' https://tagmanager.google.com;

    upgrade-insecure-requests;
  """
